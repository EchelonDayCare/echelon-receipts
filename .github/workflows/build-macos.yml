name: Build macOS DMG (Apple Silicon)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm deps
        run: npm ci

      - name: Build (Apple Silicon)
        run: npm run tauri -- build --target aarch64-apple-darwin

      - name: Stage DMG
        run: |
          mkdir -p release-assets
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg "release-assets/Echelon-Receipts-AppleSilicon.dmg"
          ls -lh release-assets/

      - name: Upload Apple Silicon DMG (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Echelon-Receipts-AppleSilicon
          path: release-assets/Echelon-Receipts-AppleSilicon.dmg

      - name: Publish / Update "latest" GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build"
          body: |
            Auto-built from commit ${{ github.sha }}.

            **Download:** `Echelon-Receipts-AppleSilicon.dmg` (Apple Silicon: M1/M2/M3/M4)

            **Install:**
            1. Download the DMG
            2. Open it, drag **Echelon Receipts** into Applications
            3. Double-click the app — it just opens (ad-hoc signed, no Terminal needed)
          files: |
            release-assets/Echelon-Receipts-AppleSilicon.dmg
          draft: false
          prerelease: false
          make_latest: "true"
